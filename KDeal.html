<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDeal · 한국주식 거래</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --primary: #ea580c;
    --primary-dark: #c2410c;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --plus: #e53935;
    --minus: #1e88e5;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", Roboto, sans-serif;
    background: var(--bg); color: var(--text); }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px 80px; }
  header { display:flex; justify-content:space-between; align-items:center;
    margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  .nav-btn {
    padding: 8px 20px; border: 2px solid var(--border); border-radius: 20px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    background: var(--card); color: var(--muted);
    transition: all 0.15s; text-decoration: none; display: inline-block;
  }
  .nav-btn:hover { background: #f3f4f6; border-color: #9ca3af; color: var(--text); }
  .nav-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .card { background:#fff; border:1px solid var(--border); border-radius:12px;
    padding:16px; margin-bottom:16px; box-shadow:var(--shadow); }
  .card h2 { font-size:14px; font-weight:700; margin:0 0 12px; color:var(--text); }
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .btn-primary { background:var(--primary); color:#fff; border:none; border-radius:8px;
    padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-primary:hover { background:var(--primary-dark); }
  .btn-secondary { background:#fff; color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:9px 14px; font-size:13px; font-weight:500; cursor:pointer; }
  .btn-secondary:hover { background:#f9fafb; }

  /* Summary card */
  .kd-summary-card {
    background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
    color:#fff; padding:18px 20px; border-radius:12px;
    box-shadow:var(--shadow); margin-bottom:16px;
  }
  .kd-summary-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; }
  .kd-summary-label { font-size:11px; opacity:0.85; margin-bottom:4px; font-weight:500; }
  .kd-summary-value { font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; }
  .kd-summary-value.pos { color:#86efac; }
  .kd-summary-value.neg { color:#fca5a5; }

  /* Table */
  .kd-table { width:100%; border-collapse:collapse; font-size:12px; }
  .kd-table th { background:#f9fafb; padding:7px 10px; text-align:left;
    font-size:11px; font-weight:600; color:var(--muted);
    border-bottom:1px solid var(--border); white-space:nowrap; }
  .kd-table td { padding:8px 10px; border-bottom:1px solid #f3f4f6; vertical-align:middle; }
  .kd-table tr:last-child td { border-bottom:none; }
  .kd-table tr:hover td { background:#fafafa; }
  .ta-r { text-align:right; }
  .ta-c { text-align:center; }
  .pos { color:#16a34a; }
  .neg { color:#dc2626; }
  .muted { color:var(--muted); }
  .kd-name { font-weight:600; font-size:13px; }
  .kd-code { font-size:11px; color:var(--muted); margin-top:1px; }
  .kd-empty { padding:32px 20px; text-align:center; color:var(--muted); font-size:13px; }

  /* Trade type badge */
  .kd-type-badge { display:inline-block; padding:2px 7px; border-radius:4px;
    font-size:11px; font-weight:700; }
  .kd-type-badge.buy { background:#dcfce7; color:#166534; }
  .kd-type-badge.sell { background:#fee2e2; color:#991b1b; }

  /* Row coloring */
  .kd-row-sell td { background:#fff9f9; }
  .kd-row-buy td { background:#f9fff9; }

  /* Small buttons */
  .kd-btn-sm { font-size:11px; padding:3px 8px; border-radius:4px; cursor:pointer; border:none; }
  .kd-btn-sm:not(.del) { background:#e0f2fe; color:#0369a1; }
  .kd-btn-sm:not(.del):hover { background:#bae6fd; }
  .kd-btn-sm.del { background:#fee2e2; color:#991b1b; margin-left:3px; }
  .kd-btn-sm.del:hover { background:#fecaca; }

  /* Modal */
  .modal-backdrop { display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.45); z-index:1000;
    align-items:center; justify-content:center; padding:16px; }
  .modal-backdrop.open { display:flex; }
  .modal { background:#fff; border-radius:14px; width:100%; max-width:480px;
    max-height:90vh; overflow-y:auto; padding:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.2); }
  .modal-header { display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:16px; }
  .modal-header h2 { font-size:16px; font-weight:700; margin:0; }
  .close-btn { background:none; border:none; font-size:20px; cursor:pointer;
    color:var(--muted); padding:0 4px; line-height:1; }
  .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }

  /* Form */
  .kd-form { display:flex; flex-direction:column; gap:10px; }
  .kd-form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .kd-field { display:flex; flex-direction:column; gap:4px; }
  .kd-field label { font-size:12px; color:var(--muted); font-weight:500; }
  .kd-field input, .kd-field select {
    padding:9px 12px; border:1px solid var(--border); border-radius:8px;
    font-size:14px; font-family:inherit; background:#fff; }
  .kd-field input:focus, .kd-field select:focus {
    outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(234,88,12,0.12); }
  .kd-total-preview {
    background:#fff7ed; border:1px solid #fed7aa; border-radius:8px;
    padding:10px 14px; display:flex; justify-content:space-between;
    font-size:13px; font-weight:600; color:#9a3412; }
  .kd-type-toggle { display:flex; gap:8px; }
  .kd-type-btn { flex:1; padding:9px; border:1.5px solid var(--border); border-radius:8px;
    font-size:13px; font-weight:600; cursor:pointer; background:#fff; color:var(--muted); }
  .kd-type-btn.active-buy { background:#dcfce7; border-color:#16a34a; color:#166534; }
  .kd-type-btn.active-sell { background:#fee2e2; border-color:#dc2626; color:#991b1b; }
  .kd-sell-hint { font-size:11px; color:var(--muted); margin-top:2px; min-height:14px; }

  .app-version {
    position: fixed; top: 8px; left: 10px; z-index: 9999;
    font-size: 13px; color: rgba(0,0,0,0.55); font-weight: 700;
    pointer-events: none;
    font-variant-numeric: tabular-nums; letter-spacing: 0.3px;
  }

  /* Refresh status */
  #kdRefreshStatus { font-size:12px; color:var(--muted); }

  /* Tabs */
  .kd-tabs { display:flex; gap:4px; margin-bottom:12px; }
  .kd-tab { padding:5px 14px; border-radius:6px; font-size:12px; font-weight:600;
    cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--muted); }
  .kd-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }

  /* Timeline */
  .kd-tl-toggle {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; background:#f9fafb; border:1px solid var(--border);
    border-radius:8px; padding:8px 12px; font-size:12px; font-weight:600;
    color:var(--muted); cursor:pointer; margin-top:6px;
  }
  .kd-tl-chevron { font-size:10px; transition:transform 0.15s; display:inline-block; }

  /* Deposit modal */
  .kd-dep-summary { background:#fff7ed; border:1px solid #fed7aa; border-radius:10px;
    padding:12px 16px; margin-bottom:12px; display:flex; justify-content:space-between;
    align-items:center; font-size:14px; }
  .kd-dep-summary strong { font-size:16px; color:#9a3412; }
  .kd-dep-list { margin-top:12px; max-height:300px; overflow-y:auto; }
  .kd-dep-row { display:grid; grid-template-columns:90px 1fr 1fr auto; gap:8px;
    align-items:center; padding:8px 4px; border-bottom:1px solid #f3f4f6; font-size:13px; }
  .kd-dep-row:last-child { border-bottom:none; }
  .kd-dep-type-in  { display:inline-block; padding:2px 6px; border-radius:4px;
    font-size:11px; font-weight:700; background:#dcfce7; color:#166534; }
  .kd-dep-type-out { display:inline-block; padding:2px 6px; border-radius:4px;
    font-size:11px; font-weight:700; background:#fee2e2; color:#991b1b; }

  /* Timeline deposit row */
  .kd-tl-dep td { background:#fffbeb; }

  /* Mobile */
  @media (max-width:600px) {
    .kd-form-row { grid-template-columns:1fr; }
    .kd-table { font-size:11px; }
    .kd-table th, .kd-table td { padding:6px 6px; }
  }
</style>
</head>
<body>

<div class="app-version" id="appVersion"></div>
<div class="container">
  <header>
    <div style="display:flex;align-items:center;gap:8px">
      <a href="index.html" class="nav-btn">📊 My PM</a>
      <a href="NonK.html" class="nav-btn">🇺🇸 NonK</a>
      <a href="KDeal.html" class="nav-btn active" onclick="return false">🇰🇷 KDeal</a>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span id="kdRefreshStatus"></span>
      <button class="btn-secondary" onclick="kdRefreshAll()" style="padding:6px 12px;font-size:12px">🔄 가격 갱신</button>
    </div>
  </header>

  <div class="toolbar">
    <button class="btn-primary" onclick="kdOpenTradeModal()">+ 거래 추가</button>
    <button class="btn-secondary" onclick="kdOpenDepositModal()">💳 입출금</button>
    <button class="btn-secondary" onclick="kdExportToFile()">💾 파일로 저장</button>
    <button class="btn-secondary" onclick="document.getElementById('kdImportFile').click()">📂 파일 불러오기</button>
    <input type="file" id="kdImportFile" accept=".json" style="display:none" onchange="kdImportFromFile(event)">
  </div>

  <!-- Summary -->
  <div class="kd-summary-card">
    <div class="kd-summary-grid" id="kdSummaryGrid">
      <div><div class="kd-summary-label">투입 원금</div><div class="kd-summary-value">-</div></div>
    </div>
  </div>

  <!-- Portfolio timeline -->
  <div class="card" id="kdTimelineWrap" style="display:none">
    <h2>📊 자산 변화 추이</h2>
    <div style="position:relative;height:200px;margin-bottom:8px">
      <canvas id="kdTimelineChart"></canvas>
    </div>
    <button class="kd-tl-toggle" onclick="kdToggleTlTable()">
      <span>📋 거래별 상세 내역</span>
      <span class="kd-tl-chevron" id="kdTlChevron">▶</span>
    </button>
    <div id="kdTlTableWrap" style="display:none;margin-top:8px">
      <div id="kdTimelineContainer"></div>
    </div>
  </div>

  <!-- Open positions -->
  <div class="card">
    <h2>📈 오픈 포지션</h2>
    <div id="kdPositionsContainer"><div class="kd-empty">오픈 포지션이 없습니다.</div></div>
  </div>

  <!-- Trade history -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="margin:0">📋 거래 내역</h2>
      <div class="kd-tabs">
        <button class="kd-tab active" id="kdTabAll" onclick="kdSetTab('all')">전체</button>
        <button class="kd-tab" id="kdTabOpen" onclick="kdSetTab('open')">보유중</button>
        <button class="kd-tab" id="kdTabClosed" onclick="kdSetTab('closed')">완료</button>
      </div>
    </div>
    <div id="kdTradeHistoryContainer"><div class="kd-empty">거래 내역이 없습니다.</div></div>
  </div>
</div>

<!-- 거래 추가/편집 모달 -->
<div class="modal-backdrop" id="kdTradeModal" onclick="kdHandleTradeBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="kdTradeModalTitle">거래 추가</h2>
      <button class="close-btn" onclick="kdCloseTradeModal()">×</button>
    </div>
    <div class="kd-form">
      <!-- 1. 구분 -->
      <div class="kd-field">
        <label>구분</label>
        <div class="kd-type-toggle">
          <button id="kdTypeBuyBtn" class="kd-type-btn active-buy" onclick="kdSetTradeType('buy')">📈 매수</button>
          <button id="kdTypeSellBtn" class="kd-type-btn" onclick="kdSetTradeType('sell')">📉 매도</button>
        </div>
        <input type="hidden" id="kdTradeType" value="buy">
      </div>
      <!-- 2. 거래일 (구분 바로 다음) -->
      <div class="kd-field">
        <label>거래일</label>
        <input type="date" id="kdTradeDate" onchange="kdUpdateSellStockOptions()">
      </div>
      <!-- 3. 보유 종목 선택 (매도시만 표시) -->
      <div class="kd-field" id="kdSellStockRow" style="display:none">
        <label>보유 종목 선택</label>
        <select id="kdSellStockSelect" onchange="kdOnSellStockSelect(this.value)">
          <option value="">-- 날짜 기준 보유 종목 --</option>
        </select>
        <div class="kd-sell-hint" id="kdSellQtyHint"></div>
      </div>
      <!-- 4. 종목코드 + 종목명 -->
      <div class="kd-form-row">
        <div class="kd-field">
          <label>종목코드 (6자리)</label>
          <input type="text" id="kdTradeCode" maxlength="6" placeholder="예: 005930"
            oninput="kdOnCodeInput(this.value)" onblur="kdAutoFetchName()">
        </div>
        <div class="kd-field">
          <label>종목명</label>
          <input type="text" id="kdTradeName" placeholder="예: 삼성전자">
        </div>
      </div>
      <!-- 5. 단가 + 수량 -->
      <div class="kd-form-row">
        <div class="kd-field">
          <label>단가 (원)</label>
          <input type="number" id="kdTradePrice" min="1" step="1" placeholder="예: 75000"
            oninput="kdUpdateTradePreview()">
        </div>
        <div class="kd-field">
          <label>수량 (주)</label>
          <input type="number" id="kdTradeQty" min="1" step="1" placeholder="예: 100"
            oninput="kdUpdateTradePreview()">

      </div>
      <!-- 6. 수수료 -->
      <div class="kd-field">
        <label>수수료+세금 (원)</label>
        <input type="number" id="kdTradeFee" min="0" step="1" placeholder="0">
      </div>
      <!-- 7. 메모 -->
      <div class="kd-field">
        <label>메모 (선택)</label>
        <input type="text" id="kdTradeMemo" placeholder="거래 메모">
      </div>
      <div class="kd-total-preview" id="kdTradePreview" style="display:none">
        <span>거래 금액</span><span id="kdTradePreviewAmt">-</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="kdCloseTradeModal()">취소</button>
      <button class="btn-primary" onclick="kdSaveTrade()">저장</button>
    </div>
  </div>
</div>

<!-- 입출금 모달 -->
<div class="modal-backdrop" id="kdDepositModal" onclick="if(event.target.id==='kdDepositModal')kdCloseDepositModal()">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h2>💳 계좌 입출금</h2>
      <button class="close-btn" onclick="kdCloseDepositModal()">×</button>
    </div>
    <div class="kd-dep-summary">
      <span>누적 순입금</span>
      <strong id="kdDepTotal">-</strong>
    </div>
    <!-- 추가 폼 -->
    <div class="kd-form" id="kdDepForm">
      <div class="kd-form-row">
        <div class="kd-field">
          <label>구분</label>
          <select id="kdDepType">
            <option value="deposit">입금 (+)</option>
            <option value="withdraw">출금 (−)</option>

        </div>
        <div class="kd-field">
          <label>날짜</label>
          <input type="date" id="kdDepDate">
        </div>
      </div>

        <div class="kd-field">
          <label>금액 (원)</label>
          <input type="number" id="kdDepAmount" min="0" step="10000" placeholder="0">
        </div>
        <div class="kd-field">
          <label>메모 (선택)</label>

        </div>
      </div>
    </div>
    <div class="modal-actions" style="margin-bottom:0">
      <button class="btn-secondary" id="kdDepCancelBtn" style="display:none" onclick="kdCancelDepEdit()">취소</button>
      <button class="btn-primary" id="kdDepSaveBtn" onclick="kdSaveDep()">추가</button>
    </div>
    <!-- 목록 -->
    <div class="kd-dep-list" id="kdDepList"></div>
  </div>
</div>

<script>
// ===== 상수 =====
const KD_TRADES_KEY  = 'kdeal_trades_v1';
const KD_DEP_KEY     = 'kdeal_deposits_v1';

// ▼ Cloudflare Worker 배포 후 URL 입력 (worker/README.md 참고)
// 예: 'https://mypm-proxy.yourname.workers.dev'
const KD_CF_WORKER = 'https://my-ps-proxy.imgkang.workers.dev';

const KD_PROXIES = [
  ...(KD_CF_WORKER ? [url => `${KD_CF_WORKER}?url=${encodeURIComponent(url)}`] : []),
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];
const KD_YAHOO = ['query1.finance.yahoo.com', 'query2.finance.yahoo.com'];

// ===== 데이터 =====
let kdTrades   = kdLoadTrades();
let kdDeposits = kdLoadDeposits();
let kdPrices   = {};
let kdEditingTradeId = null;
let kdCurrentTab = 'all';

function kdLoadTrades() {
  try { return JSON.parse(localStorage.getItem(KD_TRADES_KEY)) || []; } catch(_) { return []; }
}
function kdSaveTrades() { localStorage.setItem(KD_TRADES_KEY, JSON.stringify(kdTrades)); }
function kdLoadDeposits() {
  try { return JSON.parse(localStorage.getItem(KD_DEP_KEY)) || []; } catch(_) { return []; }
}
function kdSaveDeposits() { localStorage.setItem(KD_DEP_KEY, JSON.stringify(kdDeposits)); }

// 누적 순입금
function kdNetDeposits() {
  return kdDeposits.reduce((s, d) => s + (d.type === 'withdraw' ? -Number(d.amount) : Number(d.amount)), 0);
}
// 자동 현금 잔고 = 순입금 - 매수총액 + 매도총액
function kdAutoCash() {
  let buyTotal = 0, sellTotal = 0;
  for (const t of kdTrades) {
    const fee = Number(t.fee) || 0;
    if (t.type === 'buy')  buyTotal  += t.price * t.qty + fee;
    else                   sellTotal += t.price * t.qty - fee;
  }
  return kdNetDeposits() - buyTotal + sellTotal;
}

// ===== FIFO 분석 =====
function kdDaysBetween(d1, d2) {
  return Math.max(1, Math.round((new Date(d2) - new Date(d1)) / 86400000));
}

function kdFifoAnalysis() {
  const sorted = [...kdTrades].sort((a, b) =>
    a.date !== b.date ? a.date.localeCompare(b.date) : a.id.localeCompare(b.id));

  const openLots = {};
  const closedMap = {};
  let totalRealizedPnl = 0;

  for (const t of sorted) {
    const fee = Number(t.fee) || 0;
    if (t.type === 'buy') {
      if (!openLots[t.code]) openLots[t.code] = [];
      openLots[t.code].push({ id: t.id, date: t.date, price: t.price,
        qty: t.qty, remaining: t.qty, fee, name: t.name });
    } else {
      const lots = openLots[t.code] || [];
      let sellRemain = t.qty;
      let matchedCost = 0, matchedQty = 0, weightedDays = 0;

      while (sellRemain > 0 && lots.length > 0) {
        const lot = lots[0];
        const take = Math.min(lot.remaining, sellRemain);
        const feeAlloc = lot.qty > 0 ? (lot.fee / lot.qty) * take : 0;
        matchedCost += lot.price * take + feeAlloc;
        weightedDays += kdDaysBetween(lot.date, t.date) * take;
        matchedQty += take;
        lot.remaining -= take;
        sellRemain -= take;
        if (lot.remaining === 0) lots.shift();
      }

      if (matchedQty > 0) {
        const feeAlloc = t.qty > 0 ? fee * (matchedQty / t.qty) : 0;
        const sellNet = t.price * matchedQty - feeAlloc;
        const pnl = sellNet - matchedCost;
        const simpleReturn = matchedCost > 0 ? pnl / matchedCost : 0;
        const avgDays = Math.round(weightedDays / matchedQty);
        const annReturn = avgDays > 0
          ? Math.pow(Math.max(0, sellNet / matchedCost), 365 / avgDays) - 1
          : simpleReturn;
        closedMap[t.id] = { pnl, simpleReturn, annReturn, holdingDays: avgDays,
                             buyCost: matchedCost, sellNet, qty: matchedQty };
        totalRealizedPnl += pnl;
      }
    }
  }

  const positions = [];
  for (const [code, lots] of Object.entries(openLots)) {
    const qty = lots.reduce((s, l) => s + l.remaining, 0);
    if (qty <= 0) continue;
    const cost = lots.reduce((s, l) => {
      const feePerShare = l.qty > 0 ? l.fee / l.qty : 0;
      return s + (l.price + feePerShare) * l.remaining;
    }, 0);
    positions.push({ code, name: lots[lots.length-1].name || code,
                     qty, avgPrice: cost / qty, cost, firstDate: lots[0].date });
  }
  positions.sort((a, b) => a.code.localeCompare(b.code));
  return { positions, closedMap, totalRealizedPnl };
}

// ===== 포트폴리오 타임라인 =====
function kdPortfolioTimeline() {
  // 거래 + 입출금을 날짜순으로 합산
  const allEvents = [
    ...kdTrades.map(t  => ({ ...t,  _evKind: 'trade' })),
    ...kdDeposits.map(d => ({ ...d, _evKind: 'dep'   })),
  ].sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : a.id.localeCompare(b.id));

  const openLots = {};
  let cumulativeRealizedPnl = 0;
  let cumulativeSellProceeds = 0;
  let cumulativeDeposit = 0;
  let totalBuyCost = 0;
  const events = [];

  for (const ev of allEvents) {
    if (ev._evKind === 'dep') {
      const amt = Number(ev.amount) || 0;
      cumulativeDeposit += ev.type === 'withdraw' ? -amt : amt;
      let openCost = 0;
      for (const lots of Object.values(openLots))
        for (const l of lots) if (l.remaining > 0)
          openCost += (l.price + (l.qty > 0 ? l.fee / l.qty : 0)) * l.remaining;
      events.push({ _evKind: 'dep', id: ev.id, date: ev.date, type: ev.type,
        name: ev.type === 'withdraw' ? '출금' : '입금', amount: Number(ev.amount),
        memo: ev.memo || '', cumulativeDeposit, openCost,
        realizedPnl: cumulativeRealizedPnl,
        totalEquity: cumulativeDeposit - totalBuyCost + cumulativeSellProceeds + openCost });
    } else {
      const t = ev, fee = Number(t.fee) || 0;
      if (t.type === 'buy') {
        if (!openLots[t.code]) openLots[t.code] = [];
        openLots[t.code].push({ id: t.id, date: t.date, price: t.price,
          qty: t.qty, remaining: t.qty, fee, name: t.name });
        totalBuyCost += t.price * t.qty + fee;
      } else {
        const lots = openLots[t.code] || [];
        let sellRemain = t.qty, matchedCost = 0, matchedQty = 0;
        while (sellRemain > 0 && lots.length > 0) {
          const lot = lots[0];
          const take = Math.min(lot.remaining, sellRemain);
          const feeAlloc = lot.qty > 0 ? (lot.fee / lot.qty) * take : 0;
          matchedCost += lot.price * take + feeAlloc;
          matchedQty += take; lot.remaining -= take; sellRemain -= take;
          if (lot.remaining === 0) lots.shift();
        }
        if (matchedQty > 0) {
          const sellFee = t.qty > 0 ? fee * (matchedQty / t.qty) : 0;
          const sellNet = t.price * matchedQty - sellFee;
          cumulativeRealizedPnl += sellNet - matchedCost;
          cumulativeSellProceeds += sellNet;
        }
      }
      let openCost = 0;
      for (const lots of Object.values(openLots))
        for (const l of lots) if (l.remaining > 0)
          openCost += (l.price + (l.qty > 0 ? l.fee / l.qty : 0)) * l.remaining;
      events.push({ _evKind: 'trade', id: t.id, date: t.date, type: t.type,
        name: t.name || t.code, code: t.code, qty: t.qty, price: t.price,
        cumulativeDeposit, openCost, realizedPnl: cumulativeRealizedPnl,
        totalEquity: cumulativeDeposit - totalBuyCost + cumulativeSellProceeds + openCost });
    }
  }
  return events;
}

let _kdTimelineChart = null;

function kdToggleTlTable() {
  const wrap = document.getElementById('kdTlTableWrap');
  const chevron = document.getElementById('kdTlChevron');
  const isOpen = wrap.style.display !== 'none';

function kdRenderTimeline() {
  const events = kdPortfolioTimeline();
  const wrap = document.getElementById('kdTimelineWrap');
  if (!events.length) {
    if (wrap) wrap.style.display = 'none';
    return;
  }
  if (wrap) wrap.style.display = '';

  const hasDeposit = kdDeposits.length > 0;

  // 현재 자산 계산 (오늘 날짜 포인트 추가)
  const today = new Date().toISOString().slice(0, 10);
  const lastEv = events[events.length - 1];
  let currentPointIdx = -1;

  const equityData = events.map(e => ({ x: e.date, y: Math.round(e.totalEquity / 1000000) }));
  const depData    = events.map(e => ({ x: e.date, y: Math.round(e.cumulativeDeposit / 1000000) }));
  const cashData   = events.map(e => ({ x: e.date, y: Math.round((e.totalEquity - e.openCost) / 1000000) }));

  if (today > lastEv.date) {
    const { positions, totalRealizedPnl } = kdFifoAnalysis();
    let currentEval = 0;
    for (const p of positions) {
      const info = kdPrices[p.code];
      currentEval += info ? info.price * p.qty : p.cost;
    }
    const netDep   = kdNetDeposits();
    const autoCash = kdAutoCash();
    const curTotal = netDep > 0 ? autoCash + currentEval : currentEval + totalRealizedPnl;
    currentPointIdx = equityData.length;
    equityData.push({ x: today, y: Math.round(curTotal / 1000000) });
    depData.push({ x: today, y: Math.round(netDep / 1000000) });
    cashData.push({ x: today, y: Math.round(autoCash / 1000000) });
  }

  // Chart
  const ctx = document.getElementById('kdTimelineChart');
  if (ctx) {
    if (_kdTimelineChart) { _kdTimelineChart.destroy(); _kdTimelineChart = null; }
    const eqRadius   = equityData.map((_, i) => i === currentPointIdx ? 7 : 4);
    const depRadius  = depData.map((_, i) => i === currentPointIdx ? 7 : 3);
    const cashRadius = cashData.map((_, i) => i === currentPointIdx ? 7 : 3);
    const datasets = [];
    if (hasDeposit) {
      datasets.push({
        label: '누적원금',
        data: depData,
        borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.1)',
        fill: true, tension: 0.1, pointRadius: depRadius, borderWidth: 2,
        borderDash: [4, 3]
      });
    }
    datasets.push({
      label: '계좌잔액',
      data: cashData,
      borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.0)',
      fill: false, tension: 0.1, pointRadius: cashRadius, borderWidth: 1.5,
      borderDash: [3, 2]
    });
    datasets.push({
      label: '계좌+평가',
      data: equityData,
      borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,0.08)',
      fill: true, tension: 0.1, pointRadius: eqRadius, borderWidth: 2
    });
    _kdTimelineChart = new Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } },
          tooltip: {
            callbacks: {
              title: items => {
                const idx = items[0].dataIndex;
                if (idx === currentPointIdx) return `현재 (${today})`;
                const e = events[idx];
                if (e._evKind === 'dep')
                  return `${e.date}  ${e.type === 'withdraw' ? '출금' : '입금'}  ${Math.round(e.amount / 1000000).toLocaleString()}백만원`;
                return `${e.date}  ${e.type === 'buy' ? '매수' : '매도'}  ${e.name} ${Number(e.qty).toLocaleString()}주`;
              },
              label: item => ` ${item.dataset.label}: ${item.parsed.y.toLocaleString('ko-KR')} 백만원`
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            time: {
              tooltipFormat: 'yyyy-MM-dd',
              displayFormats: { day: 'MM/dd', week: 'MM/dd', month: 'yy/MM', year: 'yyyy' }
            },
            ticks: { font: { size: 10 }, maxTicksLimit: 8 }
          },
          y: { ticks: { font: { size: 10 }, callback: v => v.toLocaleString('ko-KR') + ' 백만' } }
        }
      }
    });
  }

  // Table
  const container = document.getElementById('kdTimelineContainer');
  if (container) {
    const rows = [...events].reverse().map(e => {
      const depMon  = Math.round(e.cumulativeDeposit / 1000000);
      const rlzMon  = Math.round(e.realizedPnl / 1000000);
      const cashMon = Math.round((e.totalEquity - e.openCost) / 1000000);
      const totMon  = Math.round(e.totalEquity / 1000000);
      const rlzCls  = e.realizedPnl >= 0 ? 'pos' : 'neg';
      if (e._evKind === 'dep') {
        const sign = e.type === 'withdraw' ? '−' : '+';
        const amtMon = Math.round(e.amount / 1000000).toLocaleString('ko-KR');
        return `<tr class="kd-tl-dep">
          <td style="white-space:nowrap">${e.date}</td>
          <td><span class="kd-dep-type-${e.type === 'withdraw' ? 'out' : 'in'}">${e.type === 'withdraw' ? '출금' : '입금'}</span></td>
          <td class="muted" colspan="2">${sign}${amtMon}백만 ${e.memo ? `<span style="font-size:11px">(${e.memo})</span>` : ''}</td>
          <td class="ta-r">${depMon.toLocaleString('ko-KR')} 백만</td>
          <td class="ta-r ${rlzCls}">${rlzMon >= 0 ? '+' : ''}${rlzMon.toLocaleString('ko-KR')} 백만</td>
          <td class="ta-r" style="color:#3b82f6">${cashMon.toLocaleString('ko-KR')} 백만</td>
          <td class="ta-r" style="font-weight:700">${totMon.toLocaleString('ko-KR')} 백만</td>
        </tr>`;
      }
      return `<tr>
        <td style="white-space:nowrap">${e.date}</td>
        <td><span class="kd-type-badge ${e.type === 'buy' ? 'buy' : 'sell'}">${e.type === 'buy' ? '매수' : '매도'}</span></td>
        <td><div class="kd-name">${e.name}</div><div class="kd-code">${e.code}</div></td>
        <td class="ta-r muted" style="white-space:nowrap">${Number(e.qty).toLocaleString()} × ${Math.round(e.price).toLocaleString('ko-KR')}</td>
        <td class="ta-r">${depMon.toLocaleString('ko-KR')} 백만</td>
        <td class="ta-r ${rlzCls}">${rlzMon >= 0 ? '+' : ''}${rlzMon.toLocaleString('ko-KR')} 백만</td>
        <td class="ta-r" style="color:#3b82f6">${cashMon.toLocaleString('ko-KR')} 백만</td>
        <td class="ta-r" style="font-weight:700">${totMon.toLocaleString('ko-KR')} 백만</td>
      </tr>`;
    }).join('');
    const depCol = hasDeposit ? '누적원금' : '투자원금';
    container.innerHTML = `<div style="overflow-x:auto"><table class="kd-table">
      <thead><tr>
        <th>날짜</th><th>구분</th><th>종목/내용</th><th class="ta-r">거래</th>
        <th class="ta-r">${depCol}</th><th class="ta-r">누적실현손익</th>
        <th class="ta-r" style="color:#3b82f6">계좌잔액</th>
        <th class="ta-r" style="font-weight:700">계좌+평가</th>
      </tr></thead><tbody>${rows}</tbody>
    </table></div>`;
  }
}

// ===== 매도시 보유 종목 조회 =====
function kdGetHeldStocksAsOf(date) {
  const sorted = [...kdTrades]
    .filter(t => t.date <= date)
    .sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : a.id.localeCompare(b.id));

  const openLots = {};
  for (const t of sorted) {
    const fee = Number(t.fee) || 0;
    if (t.type === 'buy') {
      if (!openLots[t.code]) openLots[t.code] = [];
      openLots[t.code].push({ id: t.id, date: t.date, price: t.price,
        qty: t.qty, remaining: t.qty, fee, name: t.name });
    } else {
      const lots = openLots[t.code] || [];
      let sellRemain = t.qty;
      while (sellRemain > 0 && lots.length > 0) {
        const lot = lots[0];
        const take = Math.min(lot.remaining, sellRemain);
        lot.remaining -= take; sellRemain -= take;
        if (lot.remaining === 0) lots.shift();
      }
    }
  }
  return Object.entries(openLots)
    .map(([code, lots]) => {
      const qty = lots.reduce((s, l) => s + l.remaining, 0);
      return qty > 0 ? { code, name: lots[lots.length - 1].name || code, qty } : null;
    })
    .filter(Boolean)
    .sort((a, b) => a.code.localeCompare(b.code));
}

function kdUpdateSellStockOptions() {
  const sel = document.getElementById('kdSellStockSelect');
  if (!sel) return;
  const type = document.getElementById('kdTradeType')?.value;
  if (type !== 'sell') return;
  const date = document.getElementById('kdTradeDate').value;
  const prevCode = sel.value;
  const held = date ? kdGetHeldStocksAsOf(date) : [];
  sel.innerHTML = '<option value="">-- 날짜 기준 보유 종목 --</option>' +
    held.map(h => `<option value="${h.code}" data-name="${h.name}" data-qty="${h.qty}">${h.name} (${h.code}) · ${h.qty.toLocaleString()}주</option>`).join('');
  if (prevCode) sel.value = prevCode;
}

function kdOnSellStockSelect(val) {
  const sel = document.getElementById('kdSellStockSelect');
  if (!sel || !val) return;
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('kdTradeCode').value = val;
  document.getElementById('kdTradeName').value = opt.dataset.name || '';
  const hintEl = document.getElementById('kdSellQtyHint');
  if (hintEl) hintEl.textContent = opt.dataset.qty ? `최대 ${Number(opt.dataset.qty).toLocaleString()}주 매도 가능` : '';
}

// ===== 수익률 포매터 =====
function kdFmtKRW(v)      { return Math.round(v / 1000000).toLocaleString('ko-KR') + ' 백만원'; }
function kdFmtPct(v, d=1) { return (v >= 0 ? '+' : '') + (v * 100).toFixed(d) + '%'; }
function kdFmtSigned(v)   {
  const abs = Math.abs(Math.round(v / 1000000)).toLocaleString('ko-KR');
  return (v >= 0 ? '+' : '−') + abs + ' 백만원';
}

// ===== 메인 렌더 =====
function kdRender() {
  const { positions, totalRealizedPnl } = kdFifoAnalysis();

  let totalCost = 0, totalEval = 0;
  for (const p of positions) {
    totalCost += p.cost;
    const info = kdPrices[p.code];
    totalEval += info ? info.price * p.qty : p.cost;
  }

  const unrealPnl   = totalEval - totalCost;
  const netDep      = kdNetDeposits();
  const autoCash    = kdAutoCash();
  // 총자산 = 현금잔고 + 평가금액 (입출금이 없으면 매수원금 기준 fallback)
  const totalAssets = netDep > 0 ? autoCash + totalEval : totalEval + totalRealizedPnl;
  const depBase     = netDep > 0 ? netDep : totalCost;
  const totalReturn = depBase > 0 ? (totalAssets - depBase) / depBase : 0;
  const cashDisplay = netDep > 0 ? autoCash : 0;

  const grid = document.getElementById('kdSummaryGrid');
  if (grid) {
    const items = [
      { label:'누적 원금',   val: kdFmtKRW(netDep > 0 ? netDep : totalCost), cls: '' },
      { label:'평가금액',    val: kdFmtKRW(totalEval),                         cls: '' },
      { label:'미실현 손익', val: kdFmtSigned(unrealPnl),      cls: unrealPnl >= 0 ? 'pos' : 'neg' },
      { label:'실현 손익',   val: kdFmtSigned(totalRealizedPnl), cls: totalRealizedPnl >= 0 ? 'pos' : 'neg' },
      { label:'현금 잔고',   val: kdFmtKRW(cashDisplay),                       cls: '' },
      { label:'누적 수익률', val: kdFmtPct(totalReturn),       cls: totalReturn >= 0 ? 'pos' : 'neg' },
    ];
    grid.innerHTML = items.map(it => `
      <div><div class="kd-summary-label">${it.label}</div>
      <div class="kd-summary-value ${it.cls}">${it.val}</div></div>`).join('');
  }

  // 오픈 포지션
  const pc = document.getElementById('kdPositionsContainer');
  if (pc) {
    if (!positions.length) {
      pc.innerHTML = '<div class="kd-empty">오픈 포지션이 없습니다.</div>';
    } else {
      const rows = positions.map(p => {
        const info = kdPrices[p.code];
        const cur  = info ? info.price : null;
        const eval_ = cur ? cur * p.qty : null;
        const unreal = eval_ !== null ? eval_ - p.cost : null;
        const pct  = unreal !== null && p.cost > 0 ? unreal / p.cost : null;
        const chgPct = info ? info.changeRate : null;
        return `<tr>
          <td><div class="kd-name">${p.name}</div><div class="kd-code">${p.code}</div></td>
          <td class="ta-r">${p.qty.toLocaleString()}</td>
          <td class="ta-r">${Math.round(p.avgPrice).toLocaleString('ko-KR')}</td>
          <td class="ta-r">${cur ? `<span>${Math.round(cur).toLocaleString('ko-KR')}</span>
            <span class="${(chgPct||0)>=0?'pos':'neg'}" style="font-size:10px;display:block">
              ${(chgPct||0)>=0?'+':''}${(chgPct||0).toFixed(2)}%</span>` : '<span class="muted">-</span>'}</td>
          <td class="ta-r">${eval_ ? kdFmtKRW(eval_) : '-'}</td>
          <td class="ta-r ${unreal!==null?(unreal>=0?'pos':'neg'):''}">
            ${unreal!==null ? kdFmtSigned(unreal) : '-'}</td>
          <td class="ta-r ${pct!==null?(pct>=0?'pos':'neg'):''}">
            ${pct!==null ? kdFmtPct(pct) : '-'}</td>
          <td>
            <button class="kd-btn-sm" onclick="kdQuickTrade('${p.code}','${p.name}','sell')">매도</button>
            <button class="kd-btn-sm" onclick="kdQuickTrade('${p.code}','${p.name}','buy')" style="margin-left:3px">추가매수</button>
          </td>
        </tr>`;
      }).join('');
      pc.innerHTML = `<div style="overflow-x:auto"><table class="kd-table">
        <thead><tr>
          <th>종목</th><th class="ta-r">수량</th><th class="ta-r">평균단가</th>
          <th class="ta-r">현재가</th><th class="ta-r">평가금액</th>
          <th class="ta-r">미실현손익</th><th class="ta-r">수익률</th><th></th>
        </tr></thead><tbody>${rows}</tbody>
      </table></div>`;
    }
  }
}

// ===== 거래 내역 렌더 =====
function kdSetTab(tab) {
  kdCurrentTab = tab;
  ['all','open','closed'].forEach(t => {
    const el = document.getElementById('kdTab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (el) el.classList.toggle('active', t === tab);
  });
  kdRenderTradeHistory();
}

function kdRenderTradeHistory() {
  const { closedMap, positions } = kdFifoAnalysis();
  const openCodes = new Set(positions.map(p => p.code));
  const container = document.getElementById('kdTradeHistoryContainer');
  if (!container) return;

  let trades = [...kdTrades].sort((a, b) => b.date.localeCompare(a.date));

  if (kdCurrentTab === 'open') {
    trades = trades.filter(t => t.type === 'buy' && openCodes.has(t.code));
  } else if (kdCurrentTab === 'closed') {
    trades = trades.filter(t => t.type === 'sell' && closedMap[t.id]);
  }

  if (!trades.length) {
    container.innerHTML = '<div class="kd-empty">해당 거래 내역이 없습니다.</div>';
    return;
  }

  const rows = trades.map(t => {
    const isSell = t.type === 'sell';
    const cl = closedMap[t.id];
    const total = t.price * t.qty;

    let pnlCols = '';
    if (isSell && cl) {
      pnlCols = `
        <td class="ta-r ${cl.pnl>=0?'pos':'neg'}" style="white-space:nowrap">${kdFmtSigned(cl.pnl)}</td>
        <td class="ta-r ${cl.simpleReturn>=0?'pos':'neg'}">${kdFmtPct(cl.simpleReturn)}</td>
        <td class="ta-r muted">${cl.holdingDays}일</td>
        <td class="ta-r ${cl.annReturn>=0?'pos':'neg'}">${kdFmtPct(cl.annReturn)}</td>`;
    } else {
      pnlCols = '<td colspan="4" class="ta-c muted" style="font-size:11px">-</td>';
    }

    return `<tr class="${isSell?'kd-row-sell':'kd-row-buy'}">
      <td style="white-space:nowrap">${t.date}</td>
      <td><span class="kd-type-badge ${isSell?'sell':'buy'}">${isSell?'매도':'매수'}</span></td>
      <td><div class="kd-name">${t.name||t.code}</div><div class="kd-code">${t.code}</div></td>
      <td class="ta-r">${Number(t.qty).toLocaleString()}</td>
      <td class="ta-r">${Math.round(t.price).toLocaleString('ko-KR')}</td>
      <td class="ta-r">${kdFmtKRW(total)}</td>
      <td class="ta-r muted">${t.fee ? Math.round(t.fee).toLocaleString('ko-KR') : '-'}</td>
      ${pnlCols}
      <td style="white-space:nowrap">
        <button class="kd-btn-sm" onclick="kdOpenTradeModal('${t.id}')">편집</button>
        <button class="kd-btn-sm del" onclick="kdDeleteTrade('${t.id}')">삭제</button>
      </td>
    </tr>`;
  }).join('');

  container.innerHTML = `<div style="overflow-x:auto"><table class="kd-table">
    <thead><tr>
      <th>날짜</th><th>구분</th><th>종목</th>
      <th class="ta-r">수량</th><th class="ta-r">단가(원)</th>
      <th class="ta-r">금액(백만)</th><th class="ta-r">수수료(원)</th>
      <th class="ta-r">손익</th><th class="ta-r">단순수익</th>
      <th class="ta-r">보유일</th><th class="ta-r">연환산IRR</th>
      <th></th>
    </tr></thead><tbody>${rows}</tbody>
  </table></div>`;
}

// ===== 거래 모달 =====
function kdSetTradeType(type) {
  document.getElementById('kdTradeType').value = type;
  document.getElementById('kdTypeBuyBtn').className  = 'kd-type-btn' + (type==='buy'  ? ' active-buy'  : '');
  document.getElementById('kdTypeSellBtn').className = 'kd-type-btn' + (type==='sell' ? ' active-sell' : '');
  const sellRow = document.getElementById('kdSellStockRow');
  if (sellRow) sellRow.style.display = type === 'sell' ? '' : 'none';
  const hintEl = document.getElementById('kdSellQtyHint');
  if (hintEl) hintEl.textContent = '';
  if (type === 'sell') kdUpdateSellStockOptions();
}

function kdOpenTradeModal(editId = null) {
  kdEditingTradeId = editId;
  const titleEl = document.getElementById('kdTradeModalTitle');
  if (editId) {
    const t = kdTrades.find(x => x.id === editId);
    if (!t) return;
    if (titleEl) titleEl.textContent = '거래 수정';
    // 날짜 먼저 설정 (sell stock options가 날짜 기준으로 로드되므로)
    document.getElementById('kdTradeDate').value  = t.date;
    kdSetTradeType(t.type);
    document.getElementById('kdTradeCode').value  = t.code;
    document.getElementById('kdTradeName').value  = t.name || '';
    document.getElementById('kdTradePrice').value = t.price;
    document.getElementById('kdTradeQty').value   = t.qty;
    document.getElementById('kdTradeFee').value   = t.fee || '';
    document.getElementById('kdTradeMemo').value  = t.memo || '';
    // 매도인 경우 드롭다운에서 해당 종목 선택
    if (t.type === 'sell') {
      setTimeout(() => {
        const sel = document.getElementById('kdSellStockSelect');
        if (sel) sel.value = t.code;
        const hintEl = document.getElementById('kdSellQtyHint');
        if (hintEl) hintEl.textContent = '';
      }, 0);
    }
  } else {
    if (titleEl) titleEl.textContent = '거래 추가';
    const now = new Date();
    document.getElementById('kdTradeDate').value =
      `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    kdSetTradeType('buy');
    document.getElementById('kdTradeCode').value  = '';
    document.getElementById('kdTradeName').value  = '';
    document.getElementById('kdTradePrice').value = '';
    document.getElementById('kdTradeQty').value   = '';
    document.getElementById('kdTradeFee').value   = '';
    document.getElementById('kdTradeMemo').value  = '';
  }
  kdUpdateTradePreview();
  document.getElementById('kdTradeModal').classList.add('open');
}

function kdQuickTrade(code, name, type) {
  kdOpenTradeModal();
  // 날짜 설정 후 타입 변경
  kdSetTradeType(type);
  document.getElementById('kdTradeCode').value = code;
  document.getElementById('kdTradeName').value = name;
  const info = kdPrices[code];
  if (info) document.getElementById('kdTradePrice').value = Math.round(info.price);
  // 매도시 드롭다운 선택
  if (type === 'sell') {
    setTimeout(() => {
      const sel = document.getElementById('kdSellStockSelect');
      if (sel) sel.value = code;
      const hintEl = document.getElementById('kdSellQtyHint');
      if (hintEl) {
        const opt = sel?.options[sel.selectedIndex];
        hintEl.textContent = opt?.dataset.qty ? `최대 ${Number(opt.dataset.qty).toLocaleString()}주 매도 가능` : '';
      }
    }, 0);
  }
  kdUpdateTradePreview();
}

function kdCloseTradeModal() {
  document.getElementById('kdTradeModal').classList.remove('open');
  kdEditingTradeId = null;
}
function kdHandleTradeBackdrop(e) {
  if (e.target.id === 'kdTradeModal') kdCloseTradeModal();
}

function kdOnCodeInput(val) {
  document.getElementById('kdTradeCode').value = val.replace(/\D/g, '').slice(0, 6);
}

let _kdNameFetchTimer = null;
function kdAutoFetchName() {
  const code = document.getElementById('kdTradeCode').value.trim();
  const nameEl = document.getElementById('kdTradeName');
  if (code.length < 5 || nameEl.value) return;
  clearTimeout(_kdNameFetchTimer);
  _kdNameFetchTimer = setTimeout(async () => {
    try {
      const info = await kdFetchStockInfo(code.padStart(6, '0'));
      if (info?.name && !nameEl.value) nameEl.value = info.name;
    } catch(_) {}
  }, 400);
}

function kdUpdateTradePreview() {
  const price = parseFloat(document.getElementById('kdTradePrice').value) || 0;
  const qty   = parseInt(document.getElementById('kdTradeQty').value) || 0;
  const prev  = document.getElementById('kdTradePreview');
  const amt   = document.getElementById('kdTradePreviewAmt');
  if (price > 0 && qty > 0) {
    if (prev) prev.style.display = '';
    if (amt) amt.textContent = Math.round(price * qty / 1000000).toLocaleString('ko-KR') + ' 백만원';
  } else {
    if (prev) prev.style.display = 'none';
  }
}

function kdSaveTrade() {
  const type  = document.getElementById('kdTradeType').value;
  const code  = document.getElementById('kdTradeCode').value.trim().padStart(6, '0');
  const name  = document.getElementById('kdTradeName').value.trim();
  const date  = document.getElementById('kdTradeDate').value;
  const price = parseFloat(document.getElementById('kdTradePrice').value) || 0;
  const qty   = parseInt(document.getElementById('kdTradeQty').value) || 0;
  const fee   = parseFloat(document.getElementById('kdTradeFee').value) || 0;
  const memo  = document.getElementById('kdTradeMemo').value.trim();

  if (!code || code === '000000') { alert('종목코드를 입력해 주세요.'); return; }
  if (!date) { alert('날짜를 선택해 주세요.'); return; }
  if (price <= 0) { alert('단가를 입력해 주세요.'); return; }
  if (qty <= 0)   { alert('수량을 입력해 주세요.'); return; }

  const entry = { type, code, name: name || code, date, price, qty, fee, memo };

  if (kdEditingTradeId) {
    const idx = kdTrades.findIndex(x => x.id === kdEditingTradeId);
    if (idx >= 0) kdTrades[idx] = { ...kdTrades[idx], ...entry };
  } else {
    kdTrades.push({ id: String(Date.now()) + Math.random().toString(36).slice(2, 6), ...entry });
  }

  kdSaveTrades();
  kdCloseTradeModal();
  kdRender();
  kdRenderTradeHistory();
  kdRenderTimeline();
}

function kdDeleteTrade(id) {
  const t = kdTrades.find(x => x.id === id);
  if (!t) return;
  if (!confirm(`${t.date} ${t.type==='buy'?'매수':'매도'} ${t.name} (${t.qty}주)를 삭제할까요?`)) return;
  kdTrades = kdTrades.filter(x => x.id !== id);
  kdSaveTrades();
  kdRender();
  kdRenderTradeHistory();
  kdRenderTimeline();
}

// ===== 입출금 모달 =====
let kdEditingDepId = null;

function kdOpenDepositModal() {
  kdEditingDepId = null;
  const now = new Date();
  document.getElementById('kdDepDate').value =
    `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('kdDepAmount').value = '';
  document.getElementById('kdDepMemo').value = '';
  document.getElementById('kdDepType').value = 'deposit';
  document.getElementById('kdDepSaveBtn').textContent = '추가';
  document.getElementById('kdDepCancelBtn').style.display = 'none';
  kdRenderDepList();
  document.getElementById('kdDepositModal').classList.add('open');
}

function kdCloseDepositModal() {
  document.getElementById('kdDepositModal').classList.remove('open');
  kdEditingDepId = null;
}

function kdRenderDepList() {
  const net = kdNetDeposits();
  const totalEl = document.getElementById('kdDepTotal');
  if (totalEl) totalEl.textContent = Math.round(net / 1000000).toLocaleString('ko-KR') + ' 백만원';

  const list = document.getElementById('kdDepList');
  if (!list) return;
  if (!kdDeposits.length) {
    list.innerHTML = '<div class="kd-empty" style="padding:16px 0">입출금 내역이 없습니다.</div>';
    return;
  }
  const sorted = [...kdDeposits].sort((a, b) =>
    b.date !== a.date ? b.date.localeCompare(a.date) : b.id.localeCompare(a.id));
  list.innerHTML = sorted.map(d => {
    const sign = d.type === 'withdraw' ? '−' : '+';
    const amt  = Math.round(Number(d.amount) / 1000000).toLocaleString('ko-KR');
    const cls  = d.type === 'withdraw' ? 'kd-dep-type-out' : 'kd-dep-type-in';
    const label= d.type === 'withdraw' ? '출금' : '입금';
    return `<div class="kd-dep-row">
      <span style="white-space:nowrap">${d.date}</span>
      <span><span class="${cls}">${label}</span></span>
      <span>${sign}${amt} 백만원${d.memo ? `<span style="color:var(--muted);font-size:11px;display:block">${d.memo}</span>` : ''}</span>
      <span style="display:flex;gap:4px">
        <button class="kd-btn-sm" onclick="kdEditDep('${d.id}')">편집</button>
        <button class="kd-btn-sm del" onclick="kdDeleteDep('${d.id}')">삭제</button>
      </span>
    </div>`;
  }).join('');
}

function kdSaveDep() {
  const type   = document.getElementById('kdDepType').value;
  const date   = document.getElementById('kdDepDate').value;
  const amount = parseFloat(document.getElementById('kdDepAmount').value) || 0;
  const memo   = document.getElementById('kdDepMemo').value.trim();
  if (!date)         { alert('날짜를 선택해 주세요.'); return; }
  if (amount <= 0)   { alert('금액을 입력해 주세요.'); return; }

  if (kdEditingDepId) {
    const idx = kdDeposits.findIndex(d => d.id === kdEditingDepId);
    if (idx >= 0) kdDeposits[idx] = { ...kdDeposits[idx], type, date, amount, memo };
  } else {
    kdDeposits.push({ id: String(Date.now()) + Math.random().toString(36).slice(2, 6),
                      type, date, amount, memo });
  }
  kdSaveDeposits();
  kdEditingDepId = null;
  document.getElementById('kdDepSaveBtn').textContent = '추가';
  document.getElementById('kdDepCancelBtn').style.display = 'none';
  document.getElementById('kdDepAmount').value = '';
  document.getElementById('kdDepMemo').value = '';
  document.getElementById('kdDepType').value = 'deposit';
  kdRenderDepList();
  kdRender();
  kdRenderTimeline();
}

function kdDeleteDep(id) {
  const d = kdDeposits.find(x => x.id === id);
  if (!d) return;
  const label = d.type === 'withdraw' ? '출금' : '입금';
  if (!confirm(`${d.date} ${label} ${Math.round(Number(d.amount) / 1000000).toLocaleString('ko-KR')}백만원을 삭제할까요?`)) return;
  kdDeposits = kdDeposits.filter(x => x.id !== id);
  kdSaveDeposits();
  kdRenderDepList();
  kdRender();
  kdRenderTimeline();
}

function kdEditDep(id) {
  const d = kdDeposits.find(x => x.id === id);
  if (!d) return;
  kdEditingDepId = id;
  document.getElementById('kdDepType').value   = d.type;
  document.getElementById('kdDepDate').value   = d.date;
  document.getElementById('kdDepAmount').value = d.amount;
  document.getElementById('kdDepMemo').value   = d.memo || '';
  document.getElementById('kdDepSaveBtn').textContent = '수정';
  document.getElementById('kdDepCancelBtn').style.display = '';
}

function kdCancelDepEdit() {
  kdEditingDepId = null;
  document.getElementById('kdDepSaveBtn').textContent = '추가';
  document.getElementById('kdDepCancelBtn').style.display = 'none';
  document.getElementById('kdDepAmount').value = '';
  document.getElementById('kdDepMemo').value = '';
  document.getElementById('kdDepType').value = 'deposit';
}

// ===== 가격 조회 =====
async function kdFetchWithTimeout(url, ms = 8000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), ms);
  try { return await fetch(url, { signal: ctrl.signal }); }
  finally { clearTimeout(tid); }
}

async function kdFetchViaProxy(url) {
  for (const proxy of KD_PROXIES) {
    try {
      const res = await kdFetchWithTimeout(proxy(url));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (text && text.length > 10) return text;
    } catch(_) {}
  }
  throw new Error('조회 실패');
}

async function kdFetchNaverPrice(code) {
  const url = `https://m.stock.naver.com/api/stock/${code}/basic`;
  const text = await kdFetchViaProxy(url);
  const data = JSON.parse(text);
  const price = parseFloat((data.closePrice || '').replace(/,/g, ''));
  if (!price) return null;
  const change     = parseFloat((data.compareToPreviousClosePrice || '0').replace(/,/g, ''));
  const changeRate = parseFloat(data.fluctuationsRatio || 0);
  const name       = data.stockName || code;
  const volume     = parseInt((data.accumulatedTradingVolume || '0').replace(/,/g, ''), 10);
  return { price, change, changeRate, name, volume, marketTime: Date.now() / 1000 };
}

async function kdFetchStockInfo(code) {
  // 1. Naver 먼저 시도 (키 불필요, 한국 종목 코드 직접 사용)
  try {
    const info = await kdFetchNaverPrice(code);
    if (info) return info;
  } catch(_) {}

  // 2. Yahoo Finance 폴백 (.KS / .KQ 자동 판별)
  const ts = Date.now();
  async function tryOne(suffix) {
    for (const host of KD_YAHOO) {
      try {
        const url = `https://${host}/v8/finance/chart/${code}${suffix}?range=1d&interval=1d&_=${ts}`;
        const data = JSON.parse(await kdFetchViaProxy(url));
        const meta = data?.chart?.result?.[0]?.meta;
        if (!meta?.regularMarketPrice) continue;
        const price = meta.regularMarketPrice;
        const prev  = meta.chartPreviousClose || price;
        return { price, change: price - prev,
          changeRate: prev > 0 ? (price - prev) / prev * 100 : 0,
          name: meta.shortName || meta.longName || code,
          volume: meta.regularMarketVolume || 0,
          marketTime: meta.regularMarketTime || 0 };
      } catch(_) {}
    }
    return null;
  }
  const [ks, kq] = await Promise.all([tryOne('.KS'), tryOne('.KQ')]);
  if (ks && kq) return ks.volume > kq.volume ? ks : kq;
  return ks || kq || null;
}

async function kdRefreshAll() {
  const el = document.getElementById('kdRefreshStatus');
  if (el) el.textContent = '조회 중...';
  const { positions } = kdFifoAnalysis();
  if (!positions.length) { if (el) el.textContent = ''; return; }
  await Promise.all(positions.map(async p => {
    try {
      const info = await kdFetchStockInfo(p.code);
      if (info) {
        kdPrices[p.code] = info;
        if (info.name && info.name !== p.code) {
          kdTrades.filter(x => x.code === p.code).forEach(x => {
            if (!x.name || x.name === x.code) x.name = info.name;
          });
          kdSaveTrades();
        }
      }
    } catch(_) {}
  }));
  const now = new Date();
  if (el) el.textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 갱신`;
  kdRender();
  kdRenderTradeHistory();
}

// ===== 파일 저장/불러오기 =====
function kdExportToFile() {
  const payload = { version: 1, exportedAt: new Date().toISOString(),
                    kdeal: { trades: kdTrades, deposits: kdDeposits } };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `kdeal_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function kdImportFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const src = data.kdeal || data;
      if (!Array.isArray(src.trades)) throw new Error('거래 데이터를 찾을 수 없습니다');
      const depCount = Array.isArray(src.deposits) ? src.deposits.length : 0;
      if (!confirm(`거래 ${src.trades.length}건, 입출금 ${depCount}건을 불러옵니다.\n현재 데이터가 덮어쓰여집니다.`)) return;
      kdTrades = src.trades;
      kdSaveTrades();
      if (Array.isArray(src.deposits)) { kdDeposits = src.deposits; kdSaveDeposits(); }
      kdRender();
      kdRenderTradeHistory();
      kdRenderTimeline();
      kdRefreshAll();
      alert('불러오기 완료');
    } catch(err) { alert('실패: ' + err.message); }
    finally { event.target.value = ''; }
  };
  reader.readAsText(file, 'utf-8');
}

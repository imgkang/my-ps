<style>
  body { font-family: monospace; padding: 20px; background: #f5f5f5; }
  h1 { font-size: 16px; margin-bottom: 16px; }
  .row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  input { padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; width: 260px; }
  button { padding: 8px 16px; font-size: 13px; background: #ea580c; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .card h2 { font-size: 13px; margin: 0 0 8px; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; margin-left: 8px; }
  .ok   { background: #dcfce7; color: #166534; }
  .err  { background: #fee2e2; color: #991b1b; }
  .pend { background: #fef9c3; color: #854d0e; }
  pre { font-size: 11px; background: #f9fafb; padding: 10px; border-radius: 6px; overflow-x: auto; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin: 6px 0 0; }
  .parsed { margin-top: 6px; }
  .parsed-item { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #f0f0f0; display: flex; gap: 12px; }
  .latency { font-size: 11px; color: #6b7280; margin-left: 6px; }

const CF_WORKER = 'https://my-ps-proxy.imgkang.workers.dev';
const PROXIES = [
  url => `${CF_WORKER}?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchVia(url, proxyIdx = 0) {
  const proxy = PROXIES[proxyIdx];
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 8000);
  try {
    const res = await fetch(proxy(url), { signal: ctrl.signal });
    clearTimeout(tid);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.text();
  } catch(e) {
    clearTimeout(tid);
    if (proxyIdx + 1 < PROXIES.length) return fetchVia(url, proxyIdx + 1);
    throw e;
  }
}

  ["278530","KODEX 주주환원고배당"],["395160","TIGER 주주환원100"],

const APIS = [
  {
    name: '⭐ 로컬 DB 검색 (네트워크 불필요)',
    url: () => null,
    localSearch: q => LOCAL_DB.filter(([code, name]) => name.includes(q) || code.startsWith(q)).slice(0, 8).map(([code, name]) => ({ name, code })),
  },
  {
    name: 'Naver Finance AC (ac.finance.naver.com)',
    url: q => `https://ac.finance.naver.com/ac?q=${encodeURIComponent(q)}&q_enc=UTF-8&t_koreng=1&st=111&r_lt=111&r_format=json`,
    parse: text => {
      const d = JSON.parse(text);
      let items = d.items || [];
      if (items.length > 0 && Array.isArray(items[0]) && Array.isArray(items[0][0])) items = items[0];
      return items.filter(it => Array.isArray(it) && it[0] && it[1])
        .slice(0, 8).map(it => ({ name: it[0], code: String(it[1]).padStart(6,'0') }));
    }
  },
  {
    name: 'Naver Mobile Stock Search (m.stock.naver.com)',
    url: q => `https://m.stock.naver.com/api/search/all?keyword=${encodeURIComponent(q)}&page=1&pageSize=10`,
    parse: text => {
      const d = JSON.parse(text);
      const items = d.result?.items || d.items || [];
      return items.slice(0, 8).map(it => ({
        name: it.stockName || it.name || it.itemName || '',
        code: String(it.itemCode || it.code || it.stockCode || '').padStart(6,'0')
      })).filter(it => it.name && it.code !== '000000');
    }
  },
  {
    name: 'Yahoo Finance Search (query1.finance.yahoo.com)',
    url: q => `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(q)}&lang=ko-KR&region=KR&quotesCount=10&newsCount=0`,
    parse: text => {
      const d = JSON.parse(text);
      return (d.finance?.result?.[0]?.quotes || d.quotes || [])
        .filter(q => q.symbol && (q.symbol.endsWith('.KS') || q.symbol.endsWith('.KQ')))
        .slice(0, 8)
        .map(q => ({
          name: q.shortname || q.longname || q.symbol,
          code: q.symbol.replace(/\.(KS|KQ)$/, '').padStart(6,'0')
        }));
    }
  },
  {
    name: 'Yahoo Finance Search query2 (query2.finance.yahoo.com)',
    url: q => `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(q)}&lang=ko-KR&region=KR&quotesCount=10&newsCount=0`,
    parse: text => {
      const d = JSON.parse(text);
      return (d.finance?.result?.[0]?.quotes || d.quotes || [])
        .filter(q => q.symbol && (q.symbol.endsWith('.KS') || q.symbol.endsWith('.KQ')))
        .slice(0, 8)
        .map(q => ({
          name: q.shortname || q.longname || q.symbol,
          code: q.symbol.replace(/\.(KS|KQ)$/, '').padStart(6,'0')
        }));
    }
  },
  {
    name: 'Naver Finance Search Page (finance.naver.com/search)',
    url: q => `https://finance.naver.com/search/searchList.naver?query=${encodeURIComponent(q)}`,
    parse: text => {
      // HTML parsing – extract table rows
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      const rows = doc.querySelectorAll('table.tbl_search tbody tr');
      const results = [];
      rows.forEach(tr => {
        const cells = tr.querySelectorAll('td');
        if (cells.length >= 2) {
          const nameEl = cells[0].querySelector('a');
          const code = (nameEl?.href?.match(/code=(\d{6})/) || cells[1]?.textContent?.match(/\d{6}/) || [])[1];
          const name = nameEl?.textContent?.trim();
          if (name && code) results.push({ name, code });
        }
      });
      return results.slice(0, 8);
    }
  },
];

function renderCard(api, state, text, parsed, ms) {
  const statusCls = state === 'ok' ? 'ok' : state === 'err' ? 'err' : 'pend';
  const statusLabel = state === 'ok' ? '✓ 성공' : state === 'err' ? '✗ 실패' : '⏳ 대기';
  const latencyHtml = ms != null ? `<span class="latency">${ms}ms</span>` : '';

  let parsedHtml = '';
  if (parsed && parsed.length) {
    parsedHtml = `<div class="parsed">${parsed.map(it =>
      `<div class="parsed-item"><strong>${it.name}</strong><span style="color:#6b7280">${it.code}</span></div>`
    ).join('')}</div>`;
  } else if (state === 'ok') {
    parsedHtml = `<div class="parsed" style="color:#dc2626;font-size:12px">파싱 결과 없음 (parse 함수 수정 필요)</div>`;
  }

  return `<div class="card" id="card-${api.idx}">
    <h2>${api.name}<span class="status ${statusCls}">${statusLabel}</span>${latencyHtml}</h2>
    ${parsedHtml}
    ${text ? `<pre>${escHtml(text.slice(0, 1500))}${text.length > 1500 ? '\n...(truncated)' : ''}</pre>` : ''}
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function runAll() {
  const q = document.getElementById('query').value.trim();
  if (!q) return;
  const container = document.getElementById('results');
  container.innerHTML = APIS.map((api, i) => {
    api.idx = i;
    return renderCard(api, 'pend', '', null, null);
  }).join('');

  APIS.forEach(async (api, i) => {
    const t0 = Date.now();
    // 로컬 DB는 네트워크 불필요
    if (api.localSearch) {
      const parsed = api.localSearch(q);
      const ms = Date.now() - t0;
      const cardEl = document.getElementById('card-' + i);
      if (cardEl) cardEl.outerHTML = renderCard(api, 'ok', `(로컬 검색, 네트워크 없음) ${parsed.length}개 결과`, parsed, ms);
      return;
    }
    try {
      const url = api.url(q);
      const text = await fetchVia(url);
      const ms = Date.now() - t0;
      let parsed = [];
      let parseErr = null;
      try { parsed = api.parse(text); } catch(e) { parseErr = e.message; }
      const cardEl = document.getElementById('card-' + i);
      if (cardEl) cardEl.outerHTML = renderCard(api, 'ok', text, parsed, ms) +
        (parseErr ? `<div style="color:red;font-size:11px;margin-top:-8px;margin-bottom:8px">Parse error: ${parseErr}</div>` : '');
    } catch(e) {
      const ms = Date.now() - t0;
      const cardEl = document.getElementById('card-' + i);
      if (cardEl) cardEl.outerHTML = renderCard(api, 'err', String(e), null, ms);
    }
  });
}

// auto-run on load
window.addEventListener('load', () => runAll());

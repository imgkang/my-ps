<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>133690 가격 조회 테스트</title>
<style>
  body { font-family: monospace; padding: 20px; background: #f5f5f5; }
  h2 { margin: 0 0 4px; }
  .sub { color: #666; font-size: 13px; margin-bottom: 16px; }
  .result { margin: 6px 0; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  .ok   { background: #d1fae5; border-left: 4px solid #10b981; }
  .fail { background: #fee2e2; border-left: 4px solid #ef4444; }
  .warn { background: #fef3c7; border-left: 4px solid #f59e0b; }
  .wait { background: #f3f4f6; border-left: 4px solid #9ca3af; }
  pre { margin: 4px 0 0; white-space: pre-wrap; word-break: break-all; font-size: 12px; }
  button { padding: 10px 24px; font-size: 14px; cursor: pointer;
           background: #2563eb; color: white; border: none; border-radius: 6px; margin-bottom: 20px; }
  .verdict { margin-top: 14px; padding: 12px 16px; border-radius: 8px;
             background: #1e40af; color: #fff; font-size: 14px; font-weight: 700; }
</style>
</head>
<body>
<h2>133690 가격 조회 테스트</h2>
<p class="sub">KS·KQ 양쪽 가격·거래량 비교 → 올바른 suffix 결정 검증</p>
<button onclick="runAll()">▶ 전체 테스트 시작</button>
<div id="out"></div>
<div id="verdict"></div>

<script>
const CODE = '133690';
const out  = document.getElementById('out');
const enc  = u => encodeURIComponent(u);
const cp   = u => `https://corsproxy.io/?${enc(u)}`;

function log(id, cls, html) {
  let el = document.getElementById(id);
  if (!el) { el = document.createElement('div'); el.id = id; el.className = 'result wait'; out.appendChild(el); }
  el.className = 'result ' + cls;
  el.innerHTML = html;
}
async function timed(fn) {
  const t = Date.now();
  try   { return { ok: true,  data: await fn(), ms: Date.now() - t }; }
  catch (e) { return { ok: false, err: String(e), ms: Date.now() - t }; }
}
const fmtKRW = v => v != null ? Number(v).toLocaleString('ko-KR') + '원' : '?';
const fmtPct = v => v != null ? (v >= 0 ? '+' : '') + (+v).toFixed(2) + '%' : '?';

function show(r, label) {
  if (r.ok) {
    const d = r.data;
    const cls = r.data._warn ? 'warn' : 'ok';
    const priceLine = d.price != null ? `${fmtKRW(d.price)}  ${fmtPct(d.changePct)}  ⏱${r.ms}ms` : `⏱${r.ms}ms`;
    return [cls, `✅ ${label}<br><pre>${priceLine}\n${JSON.stringify(d, null, 2).slice(0, 700)}</pre>`];
  }
  return ['fail', `❌ ${label}<br><pre>${r.err}  ⏱${r.ms}ms</pre>`];
}

/* ── v8 chart 1개 조회 헬퍼 ── */
async function fetchV8(suffix) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${CODE}${suffix}?range=1d&interval=1d&_=${Date.now()}`;
  const r = await fetch(cp(url), { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const j = await r.json();
  const meta = j?.chart?.result?.[0]?.meta;
  if (!meta?.regularMarketPrice) throw new Error('regularMarketPrice 없음');
  const price  = meta.regularMarketPrice;
  const prev   = meta.chartPreviousClose || meta.previousClose || price;
  const change = price - prev;
  return {
    price, prev, changePct: prev ? change / prev * 100 : 0,
    volume: meta.regularMarketVolume ?? 0,
    symbol: meta.symbol, longName: meta.longName,
    marketTime: new Date(meta.regularMarketTime * 1000).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }),
  };
}

const TESTS = [

  /* 1. KS suffix 단독 */
  { id: 't1', label: `① Yahoo v8  ${CODE}.KS (KOSPI)`, fn: async () => {
    return await fetchV8('.KS');
  }},

  /* 2. KQ suffix 단독 */
  { id: 't2', label: `② Yahoo v8  ${CODE}.KQ (KOSDAQ)`, fn: async () => {
    return await fetchV8('.KQ');
  }},

  /* 3. 현재 MyPM 방식: 병렬 후 거래량 높은 쪽 선택 */
  { id: 't3', label: '③ [현재 MyPM v1.36 방식] 병렬 KS·KQ → volume 높은 쪽 선택', fn: async () => {
    const [ks, kq] = await Promise.allSettled([fetchV8('.KS'), fetchV8('.KQ')]);
    const ksOk = ks.status === 'fulfilled' ? ks.value : null;
    const kqOk = kq.status === 'fulfilled' ? kq.value : null;
    let chosen, reason;
    if (ksOk && kqOk) {
      if (kqOk.volume >= ksOk.volume) { chosen = { ...kqOk, suffix: '.KQ' }; reason = `KQ 선택 (volume KQ=${kqOk.volume} >= KS=${ksOk.volume})`; }
      else                            { chosen = { ...ksOk, suffix: '.KS' }; reason = `KS 선택 (volume KS=${ksOk.volume} > KQ=${kqOk.volume})`; }
    } else if (ksOk) { chosen = { ...ksOk, suffix: '.KS' }; reason = 'KQ 실패 → KS만 응답'; }
    else if (kqOk)   { chosen = { ...kqOk, suffix: '.KQ' }; reason = 'KS 실패 → KQ만 응답'; }
    else throw new Error('KS·KQ 모두 실패');
    const _warn = ksOk && kqOk && ksOk.price !== kqOk.price;
    return { ...chosen, _warn,
      KS_price: ksOk?.price, KS_volume: ksOk?.volume, KS_name: ksOk?.longName,
      KQ_price: kqOk?.price, KQ_volume: kqOk?.volume, KQ_name: kqOk?.longName,
      결정이유: reason };
  }},

  /* 4. 네이버 증권 (직접 — CORS 불가 확인용) */
  { id: 't4', label: '④ Naver Finance API (직접 — 보통 CORS 차단됨)', fn: async () => {
    const url = `https://m.stock.naver.com/api/stock/${CODE}/basic`;
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    return { name: j.stockName, price: j.closePrice, changePct: j.fluctuationsRatio };
  }},

  /* 5. 네이버 증권 via corsproxy */
  { id: 't5', label: '⑤ Naver Finance API via corsproxy', fn: async () => {
    const url = `https://m.stock.naver.com/api/stock/${CODE}/basic`;
    const r = await fetch(cp(url), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = JSON.parse(await r.text());
    if (!j.closePrice) throw new Error('closePrice 없음: ' + JSON.stringify(j).slice(0,200));
    return {
      name: j.stockName, price: Number(j.closePrice?.replace(/,/g, '')),
      changePct: Number(j.fluctuationsRatio),
      marketType: j.marketType, _raw: j
    };
  }},

  /* 6. Yahoo Finance v7 quote (crumb 불필요 버전) */
  { id: 't6', label: '⑥ Yahoo v7 /quote (KQ) via corsproxy', fn: async () => {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${CODE}.KQ&_=${Date.now()}`;
    const r = await fetch(cp(url), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    const q = j?.quoteResponse?.result?.[0];
    if (!q) throw new Error('결과 없음: ' + JSON.stringify(j).slice(0,200));
    return {
      price: q.regularMarketPrice, prev: q.regularMarketPreviousClose,
      changePct: q.regularMarketChangePercent,
      volume: q.regularMarketVolume, name: q.longName || q.shortName,
      symbol: q.symbol
    };
  }},

  /* 7. Yahoo Finance v7 quote KS via corsproxy */
  { id: 't7', label: '⑦ Yahoo v7 /quote (KS) via corsproxy', fn: async () => {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${CODE}.KS&_=${Date.now()}`;
    const r = await fetch(cp(url), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    const q = j?.quoteResponse?.result?.[0];
    if (!q) throw new Error('결과 없음');
    return {
      price: q.regularMarketPrice, prev: q.regularMarketPreviousClose,
      changePct: q.regularMarketChangePercent,
      volume: q.regularMarketVolume, name: q.longName || q.shortName,
      symbol: q.symbol
    };
  }},

];

async function runAll() {
  out.innerHTML = '';
  document.getElementById('verdict').innerHTML = '';
  for (const t of TESTS) log(t.id, 'wait', `⏳ ${t.label}`);

  const results = await Promise.all(TESTS.map(async t => {
    const r = await timed(t.fn);
    const [cls, html] = show(r, t.label);
    log(t.id, cls, html);
    return { id: t.id, r };
  }));

  // 최종 verdict
  const t3 = results.find(x => x.id === 't3');
  if (t3?.r?.ok) {
    const d = t3.r.data;
    const warn = d._warn ? `⚠ KS(${d.KS_price?.toLocaleString()}원)와 KQ(${d.KQ_price?.toLocaleString()}원) 가격이 다름! 거래량 기준으로 ${d.suffix} 선택됨.` : `KS·KQ 가격 일치 또는 한쪽만 응답.`;
    document.getElementById('verdict').innerHTML =
      `<div class="verdict">📊 현재 MyPM 선택: <b>${d.suffix}</b> → ${d.price?.toLocaleString()}원 (${fmtPct(d.changePct)})<br>${warn}<br>결정이유: ${d.결정이유}</div>`;
  }
}
</script>
</body>
</html>

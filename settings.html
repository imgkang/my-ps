<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설정</title>
  <style>
    html, body { margin: 0; height: 100%; background: #f5f6f8; }
    .wrap { display: flex; align-items: center; justify-content: center; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">설정 여는 중…</div>
  <script>
    // 설정 진입점 — 설정 UI 는 index.html 에 있으므로 그쪽으로 넘기되,
    // 끝난 뒤 돌아올 위치(return)를 함께 전달한다.
    (function () {
      var ALLOW = ['index.html', 'NonK.html', 'KDeal.html'];
      function basename(u) {
        try { return (new URL(u, location.href).pathname.split('/').pop()) || ''; }
        catch (_) { return ''; }
      }
      var ret = new URLSearchParams(location.search).get('return');
      if (!ret && document.referrer) ret = basename(document.referrer);
      if (ALLOW.indexOf(ret) === -1) ret = 'index.html';
      location.replace('index.html?openSettings=1&return=' + encodeURIComponent(ret));
    })();
  </script>
</body>
</html>

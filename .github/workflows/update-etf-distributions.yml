name: Update etf_distributions.json

on:
  schedule:
    # Weekdays 09:00 KST (00:00 UTC) — after KRX has settled the prior session.
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      discover:
        description: 'Run --discover for this date (YYYYMMDD) instead of --run'
        required: false
        default: ''
      bld:
        description: 'Override KRX screen id (bld)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: update-etf-distributions
  cancel-in-progress: false

env:
  # Confirmed KRX screen id. Leave blank until captured; a manual run can pass
  # `bld` via workflow_dispatch. Scheduled --run fails loudly if still unset.
  KRX_ETF_DIST_BLD: ''

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Discovery mode: dump raw KRX columns to the log so bld/FIELD_MAP can be
      # pinned down. GitHub runners can reach data.krx.co.kr (unlike the dev
      # sandbox), so this is where the bld gets confirmed.
      - name: Discover KRX columns
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.discover != '' }}
        run: |
          python3 scripts/etf_distribution_collector.py \
            --discover "${{ inputs.discover }}" \
            ${{ inputs.bld != '' && format('--bld {0}', inputs.bld) || '' }}

      - name: Collect ETF distributions
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.discover == '' }}
        run: |
          python3 scripts/etf_distribution_collector.py --run \
            ${{ inputs.bld != '' && format('--bld {0}', inputs.bld) || '' }}

      - name: Commit if changed
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.discover == '' }}
        run: |
          if [ ! -f etf_distributions.json ]; then
            echo "etf_distributions.json missing — collector failed."
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add etf_distributions.json
          if git diff --cached --quiet -- etf_distributions.json; then
            echo "etf_distributions.json unchanged — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): update etf_distributions.json $(date -u +%Y-%m-%d)"
          git push

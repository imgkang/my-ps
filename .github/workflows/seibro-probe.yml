name: SEIBRO ETF distribution API probe (temporary)

# Keyless reconnaissance: the dev sandbox can't reach data.go.kr / SEIBRO
# (egress 403), but GitHub runners can. This dumps public catalog + spec
# pages so we can pin down the exact ETF 분배금 (distribution) service,
# operation name, and response field names before requesting an API key.
# Delete this workflow once the endpoint is confirmed.

on:
  push:
    branches: [claude/auto-read-chat-dividends-gnxwi7]
    paths: ['.github/workflows/seibro-probe.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe data.go.kr dataset specs + search + SEIBRO
        run: |
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36'
          KW='분배|분배금|배당|distribution|dividend|ETF|주당|기준일|지급일|종목코드|operation|getStk|getEtf|getETF|getSecn|Secn'

          probe() {
            local label="$1"; local url="$2"
            echo ""
            echo "========================================================"
            echo "### $label"
            echo "URL: $url"
            code=$(curl -sS -L -A "$UA" -m 40 -o /tmp/body.html -w '%{http_code}' "$url" || echo "ERR")
            echo "HTTP: $code   bytes: $(wc -c </tmp/body.html 2>/dev/null || echo 0)"
            echo "--- keyword hits (unique, first 60) ---"
            grep -ioE "$KW" /tmp/body.html 2>/dev/null | sort | uniq -c | sort -rn | head -60 || true
            echo "--- lines mentioning 분배/ETF/배당 (first 40) ---"
            grep -inE '분배|ETF|배당|distribution|주당|기준일|지급' /tmp/body.html 2>/dev/null \
              | sed -E 's/<[^>]+>/ /g' | tr -s ' ' | head -40 || true
          }

          # data.go.kr dataset detail (server-renders 상세기능/요청·응답 필드 표)
          probe "data.go.kr 금융위 주식배당정보 (15043284) detail" \
            "https://www.data.go.kr/tcs/dss/selectApiDataDetailView.do?publicDataPk=15043284"
          probe "data.go.kr 예탁결제원 주식정보서비스 (15001145) detail" \
            "https://www.data.go.kr/tcs/dss/selectApiDataDetailView.do?publicDataPk=15001145"
          probe "data.go.kr 금융위 증권상품시세정보 (15094806) detail" \
            "https://www.data.go.kr/tcs/dss/selectApiDataDetailView.do?publicDataPk=15094806"
          probe "data.go.kr 금융위 주식권리일정정보 (15059609) detail" \
            "https://www.data.go.kr/tcs/dss/selectApiDataDetailView.do?publicDataPk=15059609"

          # data.go.kr keyword search — is there a dedicated ETF 분배금 dataset?
          probe "data.go.kr search: ETF 분배금" \
            "https://www.data.go.kr/tcs/dss/selectDataSetList.do?dType=API&keyword=$(python3 -c "import urllib.parse;print(urllib.parse.quote('ETF 분배금'))")"
          probe "data.go.kr search: 분배금" \
            "https://www.data.go.kr/tcs/dss/selectDataSetList.do?dType=API&keyword=$(python3 -c "import urllib.parse;print(urllib.parse.quote('분배금'))")"

          # SEIBRO legacy OpenAPI base (does it respond / list a service?)
          probe "SEIBRO legacy OpenAPI base" \
            "http://api.seibro.or.kr/openapi/service/StockSvc"

          echo ""
          echo "========================================================"
          echo "DONE — inspect hits above to pin the ETF distribution service."

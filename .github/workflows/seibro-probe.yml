name: SEIBRO probe (temporary)

# Fetch the WebSquare screen definition for ETF 분배금지급현황 (BIP_CNTS06030V)
# from a GitHub runner (seibro.or.kr is reachable from CI) to extract the
# distribution grid's callServletService action/task/params + response field
# names. Delete once the collector is wired up.

on:
  push:
    branches: [claude/auto-read-chat-dividends-gnxwi7]
    paths: ['.github/workflows/seibro-probe.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch SEIBRO screen def + referenced JS
        run: |
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36'

          get() {
            local label="$1"; local url="$2"
            echo ""
            echo "======================================================== $label"
            echo "URL: $url"
            code=$(curl -sS -L -A "$UA" -m 25 -H "Referer: https://seibro.or.kr/" \
              -o /tmp/b.txt -w '%{http_code}' "$url" || echo ERR)
            echo "HTTP: $code  bytes: $(wc -c </tmp/b.txt 2>/dev/null || echo 0)"
          }

          dump() {
            echo "--- lines with action=/task=/callServlet ---"
            grep -noE 'action="[^"]+"|task="[^"]+"|callServletService[^"'"'"' ]*' /tmp/b.txt | head -60 || true
            echo "--- distribution-ish ids/fields (Setl/Dist/Alot/분배/지급/기준/Pay/Evl) ---"
            grep -noiE '(SETL|DIST|ALOT|ALOC|DVDN|PAY|EVL|STD_DT|BAS_DT|RGHT|분배|지급|기준|주당)[A-Za-z_0-9]*' /tmp/b.txt \
              | sort -t: -k2 | awk -F: '!seen[$2]++' | head -80 || true
          }

          get "screen BIP_CNTS06030V.xml" \
            "https://seibro.or.kr/IPORTAL/user/etf/BIP_CNTS06030V.xml"
          sed -E 's/></>\n</g' /tmp/b.txt > /tmp/s.txt
          echo "===== reqParam template (param node names) ====="
          awk '/<reqParam/{p=1} p{print NR": "$0} /<\/reqParam>/{if(p){print NR": "$0; if(++n>=3) p=0; else p=0}}' /tmp/s.txt | cut -c1-200 | head -120 || true
          echo "===== xf:instance / xf:bind blocks ====="
          grep -inE '<xf:(instance|bind|model)|nodeset=|ref="request' /tmp/s.txt | cut -c1-200 | head -80 || true
          echo "===== input controls bound to reqParam (유형/운용사/배당구분/기간) ====="
          grep -inE 'reqParam/|STD_DT|PAY_TERM|BEGIN_DT|END_DT|ISIN|MNGCO_CUSTNO|ETF_SORT_CD|RGHT_TPCD|SDT|EDT|inputCalendar|selectbox' /tmp/s.txt | cut -c1-200 | head -80 || true

name: SEIBRO ETF distribution API probe (temporary)

# Keyless reconnaissance: the dev sandbox can't reach data.go.kr / SEIBRO
# (egress 403), but GitHub runners can. This dumps public catalog + spec
# pages so we can pin down the exact ETF 분배금 (distribution) service,
# operation name, and response field names before requesting an API key.
# Delete this workflow once the endpoint is confirmed.

on:
  push:
    branches: [claude/auto-read-chat-dividends-gnxwi7]
    paths: ['.github/workflows/seibro-probe.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe data.go.kr dataset specs + search + SEIBRO
        run: |
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36'
          # Broaden operation-token capture: SEIBRO dev-guide pages list service
          # operations named like getETF..., getStk..., getBnd...
          KW='분배|분배금|배당|distribution|dividend|ETF|ETN|주당|기준일|지급일|get[A-Z][A-Za-z]{3,40}|Svc|Service'

          probe() {
            local label="$1"; local url="$2"
            echo ""
            echo "========================================================"
            echo "### $label"
            echo "URL: $url"
            code=$(curl -sS -L -A "$UA" -m 25 -o /tmp/body.html -w '%{http_code}' "$url" || echo "ERR")
            echo "HTTP: $code   bytes: $(wc -c </tmp/body.html 2>/dev/null || echo 0)"
            echo "--- operation/keyword hits (unique, first 80) ---"
            grep -oE "$KW" /tmp/body.html 2>/dev/null | sort | uniq -c | sort -rn | head -80 || true
            echo "--- lines mentioning 분배/ETF/배당 (first 30) ---"
            grep -inE '분배|ETF|ETN|배당|distribution' /tmp/body.html 2>/dev/null \
              | sed -E 's/<[^>]+>/ /g' | tr -s ' ' | cut -c1-200 | head -30 || true
          }

          # api.seibro.or.kr is reachable from GitHub runners (data.go.kr is NOT).
          # SEIBRO OpenAPI dev-guide portal — server-rendered service/operation lists.
          probe "SEIBRO OpenAPI home" \
            "https://api.seibro.or.kr/pubc/pubr/cmm/CMPubrHome/viewCMPubrHome.do"
          probe "SEIBRO dev-guide list" \
            "https://api.seibro.or.kr/pubc/pubr/cmm/CMPubrHome/viewRQDevGuideList.do"
          probe "SEIBRO service list (guess: viewRQSvcList)" \
            "https://api.seibro.or.kr/pubc/pubr/cmm/CMPubrHome/viewRQSvcList.do"
          # SEIBRO ETF portal 분배금지급현황 screen (may expose an internal data URL)
          probe "SEIBRO ETF 분배금지급현황 screen" \
            "https://seibro.or.kr/websquare/control.jsp?w2xPath=/IPORTAL/user/etf/BIP_CNTS06030V.xml&menuNo=179"

          echo ""
          echo "========================================================"
          echo "DONE — inspect hits above to pin the ETF distribution service."

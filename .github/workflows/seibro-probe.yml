name: SEIBRO probe (temporary)

# Fetch the WebSquare screen definition for ETF 분배금지급현황 (BIP_CNTS06030V)
# from a GitHub runner (seibro.or.kr is reachable from CI) to extract the
# distribution grid's callServletService action/task/params + response field
# names. Delete once the collector is wired up.

on:
  push:
    branches: [claude/auto-read-chat-dividends-gnxwi7]
    paths: ['.github/workflows/seibro-probe.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: POST real SEIBRO distribution call (all ETFs, 1yr)
        run: |
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36'
          URL='https://seibro.or.kr/websquare/engine/proworks/callServletService.jsp'
          REF='https://seibro.or.kr/websquare/control.jsp?w2xPath=/IPORTAL/user/etf/BIP_CNTS06030V.xml&menuNo=179'

          # Optional: prime a session cookie by loading the screen first.
          curl -sS -c /tmp/cj.txt -A "$UA" -m 25 -o /dev/null "$REF" || true

          BODY='<reqParam action="exerInfoDtramtPayStatPlist" task="ksd.safe.bip.cnts.etf.process.EtfExerInfoPTask"><START_PAGE value="1"/><END_PAGE value="30"/><etf_big_sort_cd value=""/><etf_sort_cd value=""/><isin value=""/><mngco_custno value=""/><RGT_RSN_DTAIL_SORT_CD value=""/><fromRGT_STD_DT value="20250101"/><toRGT_STD_DT value="20261231"/></reqParam>'

          echo "POST $URL"
          code=$(curl -sS -m 30 -b /tmp/cj.txt -A "$UA" \
            -H 'Content-Type: application/xml; charset=UTF-8' \
            -H 'Accept: application/xml, text/xml, */*' \
            -H "Referer: $REF" -H 'Origin: https://seibro.or.kr' \
            -H 'X-Requested-With: XMLHttpRequest' \
            --data-raw "$BODY" -o /tmp/r.xml -w '%{http_code}' "$URL" || echo ERR)
          echo "HTTP: $code   bytes: $(wc -c </tmp/r.xml 2>/dev/null || echo 0)"
          echo "===== result count / vector header ====="
          grep -oE '<vector[^>]*result="[0-9]+"' /tmp/r.xml | head -1 || true
          echo "===== first 2 <result> records (field names!) ====="
          sed -E 's/></>\n</g' /tmp/r.xml | sed -n '1,80p' | cut -c1-200 || true
